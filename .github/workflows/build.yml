name: Build & Release Cherry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Build each macOS architecture ─────────────────────────────────────────
  build:
    name: Build (${{ matrix.label }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            label: macos-intel
            artifact: CherryIntel.dmg

          - target: aarch64-apple-darwin
            label: macos-arm
            artifact: CherryArm.dmg

          - target: universal-apple-darwin
            label: macos-universal
            artifact: CherryUniversal.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri – ${{ matrix.label }}
        run: npx tauri build --target ${{ matrix.target }} --no-sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename DMG to canonical artifact name
        run: |
          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "No DMG found!" && exit 1
          fi
          cp "$DMG" "${{ matrix.artifact }}"
        shell: bash

      # Upload the renamed DMG so the release job can download it
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ─── Delete old release, create new one, attach all DMGs ──────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish on direct pushes to main (not on PRs)
    if: github.event_name != 'pull_request'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List downloaded assets
        run: ls -lh release-assets/

      - name: Delete existing "Cherry v1.0.0" release & tag (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.0"
          RELEASE_ID=$(gh release view "$TAG" --json id -q '.id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting existing release $RELEASE_ID..."
            gh release delete "$TAG" --yes --cleanup-tag
          else
            echo "No existing release found, creating fresh."
          fi

      - name: Create "Cherry v1.0.0" release & upload DMGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.0 \
            --title "Cherry v1.0.0" \
            --notes "Latest Cherry UI build for macOS.
          
          ## Downloads
          - **CherryUniversal.dmg** – macOS Universal (Intel + Apple Silicon, recommended)
          - **CherryArm.dmg** – macOS Apple Silicon (M1/M2/M3)
          - **CherryIntel.dmg** – macOS Intel
          
          ## Install via script
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/zyit0000/Cherry-ui/main/install.sh | bash
          \`\`\`" \
            release-assets/CherryIntel.dmg \
            release-assets/CherryArm.dmg \
            release-assets/CherryUniversal.dmg