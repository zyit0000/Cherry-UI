name: Build Cherry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            label: macos-intel
          - target: aarch64-apple-darwin
            label: macos-arm
          - target: universal-apple-darwin
            label: macos-universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # universal needs both slices; individual targets are a subset
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri – ${{ matrix.label }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Cherry-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Cherry.app
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30
